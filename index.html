<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fetch API Practice</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #todo-list { list-style: none; padding: 0; }
        li { padding: 8px; border-bottom: 1px solid #eee; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>My To-Do List</h1>
    <button id="fetch-btn">Get To-Dos</button>
    <ul id="todo-list"></ul>
    <p id="status-msg"></p>

    <script>
        // 1. Select DOM elements
        const btn = document.getElementById('fetch-btn');
        const list = document.getElementById('todo-list');
        const status = document.getElementById('status-msg');

        // 2. Define the async fetch function
        async function getTodos() {
    // Corrected URL with the full path to the todos resource
    const url = "https://jsonplaceholder.typicode.com/todos";
    status.textContent = "Loading...";
    list.innerHTML = ""; 

    try {
        const response = await fetch(url);

        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();

        // Optional: limit to first 10 items so the list isn't too long
        const limitedData = data.slice(0, 10);

        limitedData.forEach(todo => {
            const li = document.createElement('li');
            li.textContent = `${todo.completed ? '✅' : '❌'} ${todo.title}`;
            list.appendChild(li);
        });

        status.textContent = "Data fetched successfully!";
        status.className = ""; // Reset error styling if it was there
    } catch (error) {
        console.error("Fetch error:", error);
        status.textContent = "Failed to load data. Check your internet or the URL.";
        status.className = "error";
    }
}


        // 4. Attach event listener
        btn.addEventListener('click', getTodos);
    </script>
</body>
</html>
